apiVersion: v1
kind: ServiceAccount
metadata:
  name: local-ssd-provisioner-sa
  namespace: local-ssd-storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: local-ssd-provisioner-role
  namespace: local-ssd-storage
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: local-ssd-provisioner-rolebinding
  namespace: local-ssd-storage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: local-ssd-provisioner-role
subjects:
  - kind: ServiceAccount
    name: local-ssd-provisioner-sa
    namespace: local-ssd-storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-ssd-provisioner-clusterrole
rules:
  - apiGroups: [""]
    resources: ["nodes", "persistentvolumeclaims", "configmaps", "pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-ssd-provisioner-clusterrolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: local-ssd-provisioner-clusterrole
subjects:
  - kind: ServiceAccount
    name: local-ssd-provisioner-sa
    namespace: local-ssd-storage
